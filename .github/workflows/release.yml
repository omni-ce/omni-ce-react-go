name: Release Multi Platform

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
env:
  NODE_OPTIONS: --max-old-space-size=4096
  NAME: react-go
  COOLIFY_URL: https://c00l.molinar.id
  COOLIFY_CONTAINER_URL: https://react-go.molinar.id
  COOLIFY_UUID: 19989165-7709-458b-8168-91347559547f

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-x64
            ext: ""
          - os: macos-latest
            asset_name: macos-x64
            ext: ""
          - os: windows-latest
            asset_name: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.6"

      - name: Build & Compile (Bun)
        shell: bash
        run: |
          set -euo pipefail

          # Build frontend
          bun install --no-frozen-lockfile
          VITE_IS_DOCKER=true bun --smol run build

          # Build backend Golang
          go mod download
          go build -o ${{ env.NAME }}${{ matrix.ext }} main.go
          chmod +x ./${{ env.NAME }}${{ matrix.ext }} || true

          # Move to release folder
          mkdir -p release
          mv ./${{ env.NAME }}${{ matrix.ext }} ./release/${{ env.NAME }}-${{ matrix.asset_name }}${{ matrix.ext }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-${{ matrix.asset_name }}
          path: release/${{ env.NAME }}-${{ matrix.asset_name }}${{ matrix.ext }}

  docker_hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.NAME }}:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.NAME }}:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.NAME }}
          readme-filepath: README.md

      - name: Wait 5 seconds
        run: sleep 5

      # - name: Trigger remote deploy API
      #   run: |
      #     curl -s -X GET \
      #       -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
      #       "${{ env.COOLIFY_URL }}/api/v1/deploy?uuid=${{ env.COOLIFY_UUID }}&force=false"
      #     echo "Deployed successfully: ${{ env.COOLIFY_CONTAINER_URL }}"

  github_release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/${{ env.NAME }}-*
